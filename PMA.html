<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การคำนวณสารอาหาร - โรงเรียนเบาหวาน</title>


    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">


    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #f0f9f1 0%, #e6f4ea 100%);
        }
        .modal {
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
        }
        .history-item {
            transition: all 0.2s;
        }
        .history-item:hover {
            background-color: #f9fafb;
        }
        .big-input {
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .big-input:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>


<body class="flex items-center justify-center min-h-screen p-4 md:p-8">


    <div class="bg-white rounded-3xl shadow-xl p-6 md:p-10 w-full max-w-2xl border border-emerald-100">


        <header class="text-center mb-8">
            <div class="inline-block p-3 bg-emerald-100 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-emerald-800">คำนวณสัดส่วนอาหาร</h1>
            <p class="text-emerald-600 font-medium">โรงเรียนเบาหวานวิทยา ศูนย์สุขภาพชุมชนสระโบราณ</p>
        </header>


        <!-- FORM SECTION -->
        <div id="formContainer" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ชื่อ-นามสกุล</label>
                    <input id="name" type="text" placeholder="ระบุชื่อของคุณ" class="w-full p-3 border border-gray-300 rounded-xl big-input">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">จังหวัด/ข้อมูลเพิ่มเติม</label>
                    <input id="dob" type="text" placeholder="ระบุจังหวัด" class="w-full p-3 border border-gray-300 rounded-xl big-input">
                </div>
            </div>


            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">เพศ</label>
                    <select id="gender" class="w-full p-3 border border-gray-300 rounded-xl big-input bg-white">
                        <option value="male">ชาย</option>
                        <option value="female">หญิง</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">อายุ (ปี)</label>
                    <input id="age" type="number" placeholder="0" class="w-full p-3 border border-gray-300 rounded-xl big-input">
                </div>
            </div>


            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">น้ำหนัก (กก.)</label>
                    <input id="weight" type="number" placeholder="0.0" step="0.1" class="w-full p-3 border border-gray-300 rounded-xl big-input">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ส่วนสูง (ซม.)</label>
                    <input id="height" type="number" placeholder="0" class="w-full p-3 border border-gray-300 rounded-xl big-input">
                </div>
            </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">คาร์โบไฮเดรตที่เลือก</label>
                    <select id="carbPercentSelect" class="w-full p-3 border border-gray-300 rounded-xl big-input bg-white">
                        <option value="5"selected >ร้อยละ 5</option>
                        <option value="10" >ร้อยละ 10</option>
                        <option value="20" >ร้อยละ 20</option>
                    </select>
                </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">ระดับกิจกรรม</label>
                <select id="activity" class="w-full p-3 border border-gray-300 rounded-xl big-input bg-white">
                    <option value="1.2"  >นั่งทำงานอยู่กับที่และไม่ออกกำลังกายเลย</option>
                    <option value="1.375">ออกกำลังกายเล็กน้อย 1-3 วัน/สัปดาห์</option>
                    <option value="1.55" >ออกกำลังกายปานกลาง 3-5 วัน/สัปดาห์</option>
                    <option value="1.725">ออกกำลังกายหนัก 6-7 วัน/สัปดาห์</option>
                    <option value="1.9"  >ออกกำลังกายหนักมาก ทุกวันเช้าเย็น</option>
                </select>
            </div>


            <button onclick="calculate()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl text-lg font-semibold shadow-lg transition-transform transform active:scale-[0.98]">
                เริ่มคำนวณผลลัพธ์
            </button>


            <div class="grid grid-cols-2 gap-4 pt-2">
                <button onclick="showHistory()" class="flex items-center justify-center gap-2 bg-blue-50 text-blue-600 border border-blue-200 py-3 rounded-xl font-medium hover:bg-blue-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" />
                    </svg>
                    ดูประวัติ
                </button>
                <button onclick="showRecommendation()" class="flex items-center justify-center gap-2 bg-orange-50 text-orange-600 border border-orange-200 py-3 rounded-xl font-medium hover:bg-orange-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                    คำแนะนำ
                </button>
            </div>
        </div>


        <!-- RESULT SECTION -->
        <div id="resultContainer" class="hidden space-y-6 animate-in fade-in duration-500">
            <div id="result" class="bg-emerald-50 border border-emerald-100 p-5 rounded-2xl"></div>


            <div class="p-4 bg-white border rounded-2xl shadow-sm">
                <h3 class="font-bold text-gray-800 text-center mb-4">สัดส่วนสารอาหารที่แนะนำ</h3>
                <div class="relative h-[300px] flex items-center justify-center">
                    <canvas id="macroChart"></canvas>
                </div>
            </div>


            <div id="summary" class="bg-white border-2 border-emerald-500 p-5 rounded-2xl shadow-sm text-center"></div>


            <div class="space-y-3 pt-4">
                <button onclick="printPDF()" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm5 6a1 1 0 10-2 0v3.586l-1.293-1.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V8z" clip-rule="evenodd" />
                    </svg>
                    พิมพ์ผลลัพธ์เป็น PDF
                </button>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="showHistory()" class="bg-gray-100 text-gray-700 py-3 rounded-xl font-medium">ดูประวัติ</button>
                    <button onclick="showRecommendation()" class="bg-gray-100 text-gray-700 py-3 rounded-xl font-medium">คำแนะนำ</button>
                </div>
                <button onclick="showForm()" class="w-full text-emerald-600 font-semibold py-3 border border-emerald-200 rounded-xl hover:bg-emerald-50">กลับไปแก้ไขข้อมูล</button>
            </div>
        </div>
    </div>


    <!-- HISTORY MODAL -->
    <div id="historyModal" class="modal fixed inset-0 flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-3xl w-full max-w-xl max-h-[85vh] overflow-hidden flex flex-col shadow-2xl m-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800">ประวัติการคำนวณ</h2>
                <button onclick="closeModal('historyModal')" class="text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18" />
                    </svg>
                </button>
            </div>


            <div class="relative mb-4">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input id="historySearchInput" oninput="filterHistory()" placeholder="ค้นหาด้วยชื่อ..." class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl big-input">
            </div>


            <div id="historyList" class="flex-grow overflow-y-auto pr-2 no-scrollbar"></div>


            <div class="flex gap-3 mt-6">
                <button onclick="clearHistory()" class="flex-grow bg-red-50 text-red-600 py-3 rounded-xl font-medium hover:bg-red-100">ลบประวัติทั้งหมด</button>
                <button onclick="closeModal('historyModal')" class="px-8 bg-gray-800 text-white py-3 rounded-xl font-medium">ปิด</button>
            </div>
        </div>
    </div>


    <!-- RECOMMENDATION MODAL -->
    <div id="recommendationModal" class="modal fixed inset-0 flex items-center justify-center hidden p-4">
        <div class="bg-white p-8 rounded-3xl max-w-lg w-full shadow-2xl relative">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="text-orange-500">✨</span> คำแนะนำเฉพาะบุคคล
            </h2>
            <div id="recommendationContent" class="text-gray-700 leading-relaxed space-y-2"></div>
            <button onclick="closeModal('recommendationModal')" class="mt-8 w-full bg-emerald-600 text-white py-3 rounded-xl font-semibold shadow-md">เข้าใจแล้ว</button>
        </div>
    </div>


    <!-- JS LIBS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>


    <script>
        // REGISTER CHART PLUGIN
        Chart.register(ChartDataLabels);


        let lastCalculatedRecord = null;
        let allHistoryRecords = [];


        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }


        // --- ORIGINAL CALCULATIONS (UNMODIFIED LOGIC) ---
        function calculate() {
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value; // Added field support
            const gender = document.getElementById('gender').value;
            const age = parseFloat(document.getElementById('age').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const activity = parseFloat(document.getElementById('activity').value);
            const carbChoice = parseFloat(document.getElementById('carbPercentSelect').value);


            if (!weight || !height || !age || !name) {
                const message = !name ? 'กรุณากรอกชื่อ' : 'กรุณากรอกข้อมูลร่างกายให้ครบ';
                customAlert(message);
                return;
            }


            const bmi = weight / ((height / 100) ** 2);


            let bmiStatus = '';
            if (bmi <= 18.5) bmiStatus = 'น้ำหนักต่ำกว่าเกณฑ์';
            else if (bmi <= 22.9) bmiStatus = 'สมส่วน';
            else if (bmi <= 24.9) bmiStatus = 'น้ำหนักเกิน';
            else if (bmi <= 29.9) bmiStatus = 'โรคอ้วน';
            else bmiStatus = 'โรคอ้วนรุนแรง';


            let bmr;
            if (gender === 'male') {
                bmr = 66 + (13.7 * weight) + (5 * height) - (6.8 * age);
            } else {
                bmr = 665 + (9.6 * weight) + (1.8 * height) - (4.7 * age);
            }


            const tdee = bmr * activity;


            // Calculation Constants provided in prompt
            const proteinCal = weight * 1.5 * 4;
            const carbCal = tdee * (carbChoice / 100);
            const fatCal = tdee - (proteinCal + carbCal);


            const proteinGram = (proteinCal / 4).toFixed(1);
            const carbGram = (carbCal / 4).toFixed(1);
            const fatGram = (fatCal / 9).toFixed(1);


            const record = {
                name,
                dob,
                bmi: parseFloat(bmi.toFixed(1)),
                bmiStatus,
                bmr: bmr.toFixed(0),
                tdee: tdee.toFixed(0),
                proteinGram,
                carbGram,
                fatGram,
                date: new Date().toLocaleString('th-TH')
            };


            lastCalculatedRecord = record;


            let history = JSON.parse(localStorage.getItem('nutritionHistory') || '[]');
            history.unshift(record);
            localStorage.setItem('nutritionHistory', JSON.stringify(history));


            showResult(record, proteinCal, carbCal, fatCal);
        }


        function showResult(record, proteinCal, carbCal, fatCal) {
            const formContainer = document.getElementById('formContainer');
            const resultContainer = document.getElementById('resultContainer');
            const result = document.getElementById('result');
            const summary = document.getElementById('summary');


            formContainer.classList.add('hidden');
            resultContainer.classList.remove('hidden');


            const totalCal = proteinCal + carbCal + fatCal;
            const carbPercent = ((carbCal / totalCal) * 100).toFixed(1);
            const proteinPercent = ((proteinCal / totalCal) * 100).toFixed(1);
            const fatPercent = ((fatCal / totalCal) * 100).toFixed(1);


            const carbExchange = (record.carbGram / 15).toFixed(1);


            let emoji = '🙂';
            let colorClass = 'text-emerald-600';
            if (record.bmi < 18.5) { emoji = '😟'; colorClass = 'text-yellow-600'; }
            else if (record.bmi < 23) { emoji = '😊'; colorClass = 'text-emerald-600'; }
            else if (record.bmi < 25) { emoji = '😐'; colorClass = 'text-orange-600'; }
            else { emoji = '⚠️'; colorClass = 'text-red-600'; }


            result.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold text-emerald-800 mb-1">คุณ ${record.name}</h2>
                        <p class="text-sm text-emerald-700 opacity-80">${record.date}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-bold ${colorClass}">${record.bmi}</span>
                        <p class="text-xs font-semibold uppercase tracking-wider text-gray-500">BMI</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-4 py-4 border-y border-emerald-100">
                    <div>
                        <p class="text-xs text-emerald-600 font-bold uppercase">พลังงานพื้นฐาน (BMR)</p>
                        <p class="text-lg font-bold text-gray-800">${record.bmr} <span class="text-sm font-normal text-gray-500">kcal</span></p>
                    </div>
                    <div>
                        <p class="text-xs text-emerald-600 font-bold uppercase">พลังงานที่ใช้ต่อวัน (TDEE)</p>
                        <p class="text-lg font-bold text-gray-800">${record.tdee} <span class="text-sm font-normal text-gray-500">kcal</span></p>
                    </div>
                </div>
                <div class="mt-4 flex items-center gap-2">
                    <span class="text-2xl">${emoji}</span>
                    <p class="font-medium text-gray-700">สถานะร่างกาย: <span class="font-bold ${colorClass}">${record.bmiStatus}</span></p>
                </div>
            `;


            summary.innerHTML = `
                <h3 class="font-bold text-emerald-800 mb-3 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5 3a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2H5zm9 4a1 1 0 10-2 0v6a1 1 0 102 0V7zm-3 2a1 1 0 10-2 0v4a1 1 0 102 0V9zm-3 3a1 1 0 10-2 0v1a1 1 0 102 0v-1z" clip-rule="evenodd" />
                    </svg>
                    สรุปสัดส่วนสารอาหารต่อวัน
                </h3>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div class="bg-red-50 p-2 rounded-xl">
                        <p class="text-[10px] font-bold text-red-600 uppercase">โปรตีน</p>
                        <p class="text-sm font-bold">${record.proteinGram}g</p>
                    </div>
                    <div class="bg-blue-50 p-2 rounded-xl">
                        <p class="text-[10px] font-bold text-blue-600 uppercase">คาร์บ</p>
                        <p class="text-sm font-bold">${record.carbGram}g</p>
                    </div>
                    <div class="bg-yellow-50 p-2 rounded-xl">
                        <p class="text-[10px] font-bold text-yellow-600 uppercase">ไขมัน</p>
                        <p class="text-sm font-bold">${record.fatGram}g</p>
                    </div>
                </div>
                <div class="bg-emerald-600 text-white p-3 rounded-xl">
                    <p class="text-xs opacity-90">ปริมาณข้าวที่แนะนำต่อวัน</p>
                    <p class="text-2xl font-bold">${carbExchange} คาร์บ</p>
                    <p class="text-[10px] opacity-80 mt-1">(1 คาร์บ ≈ ข้าว 1 ทัพพี หรือ 15 กรัม)</p>
                </div>
            `;


            renderChart(proteinCal, carbCal, fatCal, record);
        }


        function renderChart(proteinCal, carbCal, fatCal, record) {
            const ctx = document.getElementById('macroChart').getContext('2d');
            if (window.macroChartObj) window.macroChartObj.destroy();


            window.macroChartObj = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['โปรตีน', 'คาร์โบไฮเดรต', 'ไขมัน'],
                    datasets: [{
                        data: [proteinCal, carbCal, fatCal],
                        backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Kanit', size: 12 }, padding: 20 } },
                        datalabels: {
                            color: '#fff',
                            font: { weight: 'bold', family: 'Kanit', size: 11 },
                            formatter: (value, ctx) => {
                                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                const pct = (value / total * 100).toFixed(0) + '%';
                                return pct;
                            }
                        }
                    }
                }
            });
        }


        // --- PDF & UI NAVIGATION ---
        function printPDF() {
            const element = document.getElementById('resultContainer');
            const opt = {
                margin: 0.5,
                filename: `โรงเรียนเบาหวานวิทยา_${lastCalculatedRecord.name}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }


        function showForm() {
            document.getElementById('formContainer').classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
        }


        function showHistory() {
            const historyList = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('nutritionHistory') || '[]');
            allHistoryRecords = history;
            renderHistoryList(history);
            showModal('historyModal');
        }


        function renderHistoryList(records) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';


            if (records.length === 0) {
                historyList.innerHTML = `
                    <div class="text-center py-10">
                        <div class="bg-gray-100 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                        </div>
                        <p class="text-gray-500">ไม่พบประวัติการคำนวณ</p>
                    </div>
                `;
                return;
            }


            records.forEach((rec, i) => {
                const div = document.createElement('div');
                div.className = 'history-item p-4 mb-2 border border-gray-100 rounded-2xl flex justify-between items-center cursor-pointer';
                div.onclick = () => viewRecord(i);
               
                div.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <p class="font-bold text-gray-800">${rec.name}</p>
                            <span class="text-[10px] px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded-full font-bold">BMI ${rec.bmi}</span>
                        </div>
                        <p class="text-xs text-gray-400 mt-1 flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            ${rec.dob || 'ไม่ระบุ'} • ${rec.date}
                        </p>
                    </div>
                    <button onclick="event.stopPropagation(); deleteRecord(${i})" class="p-2 text-gray-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                `;
                historyList.appendChild(div);
            });
        }


        function deleteRecord(index) {
            let history = JSON.parse(localStorage.getItem('nutritionHistory') || '[]');
            history.splice(index, 1);
            localStorage.setItem('nutritionHistory', JSON.stringify(history));
            showHistory();
        }


        function clearHistory() {
            if (confirm('คุณต้องการลบประวัติทั้งหมดใช่หรือไม่?')) {
                localStorage.removeItem('nutritionHistory');
                showHistory();
            }
        }


        function filterHistory() {
            const term = document.getElementById('historySearchInput').value.toLowerCase();
            const filtered = allHistoryRecords.filter(r => r.name.toLowerCase().includes(term));
            renderHistoryList(filtered);
        }


        function showRecommendation() {
            let text = '';
            const recommendationContent = document.getElementById('recommendationContent');


            if (!lastCalculatedRecord) {
                text = '<p class="text-center py-4">⚠️ กรุณากรอกข้อมูลและกดปุ่มคำนวณก่อนรับคำแนะนำ</p>';
            } else {
                const bmi = lastCalculatedRecord.bmi;
                if (bmi < 18.5) {
                    text = `
                        <div class="bg-yellow-50 p-4 rounded-xl mb-4 border-l-4 border-yellow-400">
                            <strong>สถานะ: น้ำหนักต่ำกว่าเกณฑ์</strong>
                        </div>
                        <p>ควรเพิ่มพลังงานจากอาหารที่มีคุณค่าทางโภชนาการสูง:</p>
                        <ul class="list-disc ml-5 space-y-2 mt-3">
                            <li>เน้นโปรตีนคุณภาพ: ไข่ ปลา นม และถั่วต่างๆ</li>
                            <li>เพิ่มมื้อย่อยระหว่างวันเป็น 4-5 มื้อ</li>
                            <li>เลือกไขมันดีจาก อะโวคาโด และถั่วเปลือกแข็ง</li>
                        </ul>`;
                } else if (bmi < 23) {
                    text = `
                        <div class="bg-emerald-50 p-4 rounded-xl mb-4 border-l-4 border-emerald-400">
                            <strong>สถานะ: น้ำหนักสมส่วน (สุขภาพดี)</strong>
                        </div>
                        <p>ควรรักษาสมดุลโภชนาการนี้ไว้ต่อเนื่อง:</p>
                        <ul class="list-disc ml-5 space-y-2 mt-3">
                            <li>เน้นทานผักผลไม้ให้ได้ 400 กรัม/วัน (ตามเกณฑ์ สสส.)</li>
                            <li>เลี่ยงอาหารรสจัด หวานจัด หรือเค็มจัด</li>
                            <li>ออกกำลังกายสม่ำเสมอสัปดาห์ละ 150 นาที</li>
                        </ul>`;
                } else {
                    text = `
                        <div class="bg-red-50 p-4 rounded-xl mb-4 border-l-4 border-red-400">
                            <strong>สถานะ: เริ่มมีภาวะน้ำหนักเกิน/โรคอ้วน</strong>
                        </div>
                        <p>ควรปรับเปลี่ยนพฤติกรรมเพื่อสุขภาพที่ดีในระยะยาว:</p>
                        <ul class="list-disc ml-5 space-y-2 mt-3">
                            <li>ลดแป้งขัดขาวและน้ำตาล (เครื่องดื่มหวานต่างๆ)</li>
                            <li>ใช้สูตร 2:1:1 (ผัก 2 ส่วน : ข้าว 1 : เนื้อ 1)</li>
                            <li>เพิ่มการเดินหรือขยับร่างกายระหว่างวัน</li>
                            <li>ปรึกษาเจ้าหน้าที่สาธารณสุขหากต้องการลดน้ำหนักอย่างถูกวิธี</li>
                        </ul>`;
                }
            }
            recommendationContent.innerHTML = text;
            showModal('recommendationModal');
        }


        function viewRecord(index) {
            const history = JSON.parse(localStorage.getItem('nutritionHistory') || '[]');
            const rec = history[index];
            if (!rec) return;


            const modal = document.createElement('div');
            modal.className = 'modal fixed inset-0 flex items-center justify-center';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };


            modal.innerHTML = `
                <div class="bg-white p-8 rounded-3xl max-w-md w-full shadow-2xl m-4">
                    <h2 class="text-xl font-bold mb-4 text-emerald-800 border-b pb-2">ข้อมูลย้อนหลัง: ${rec.name}</h2>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between"><span>BMI:</span> <span class="font-bold">${rec.bmi}</span></div>
                        <div class="flex justify-between"><span>สถานะ:</span> <span class="font-bold">${rec.bmiStatus}</span></div>
                        <div class="flex justify-between border-t pt-2"><span>โปรตีน:</span> <span class="font-bold">${rec.proteinGram} กรัม</span></div>
                        <div class="flex justify-between"><span>คาร์โบไฮเดรต:</span> <span class="font-bold">${rec.carbGram} กรัม</span></div>
                        <div class="flex justify-between"><span>ไขมัน:</span> <span class="font-bold">${rec.fatGram} กรัม</span></div>
                        <div class="flex justify-between border-t pt-2 text-gray-400"><span>วันที่คำนวณ:</span> <span>${rec.date}</span></div>
                    </div>
                    <button onclick="this.closest('.modal').remove()" class="mt-6 w-full bg-gray-100 py-3 rounded-xl font-bold hover:bg-gray-200 transition-colors">ปิด</button>
                </div>
            `;
            document.body.appendChild(modal);
        }


        function customAlert(msg) {
            const alertBox = document.createElement('div');
            alertBox.className = 'fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-[100] animate-bounce';
            alertBox.innerText = msg;
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 3000);
        }
    </script>
</body>
</html>
